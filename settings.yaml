# Default profile. Runs with zero external services or downloads (mock backends),
# so the project works immediately on a fresh clone. Override with a profile via
# HEXRAG_PROFILES=ollama (or openai). See settings-*.yaml.
server:
  env_name: ${APP_ENV:local}
  host: ${HEXRAG_HOST:0.0.0.0}
  port: ${HEXRAG_PORT:8001}

cors:
  enabled: true
  allow_origins: ["*"]
  allow_methods: ["*"]
  allow_headers: ["*"]

llm:
  mode: mock
  temperature: 0.1
  max_new_tokens: 512
  context_window: 8192
  system_prompt: >-
    You are a helpful assistant. Use the provided context to answer the question.
    If the context does not contain the answer, say you don't know.

embedding:
  mode: mock
  embed_dim: 384

vectorstore:
  database: simple

rag:
  similarity_top_k: 3

ui:
  enabled: false
  path: /ui
