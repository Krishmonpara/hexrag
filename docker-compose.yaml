# Run hexrag locally with Docker.
#   docker compose up --build
#
# Default = mock backend (no external services). To use Ollama, uncomment the
# ollama service + the environment block on hexrag, then:
#   docker compose exec ollama ollama pull llama3.2
#   docker compose exec ollama ollama pull nomic-embed-text
services:
  hexrag:
    build: .
    ports:
      - "8001:8001"
    volumes:
      - ./local_data:/app/local_data
    environment:
      HEXRAG_PROFILES: ${HEXRAG_PROFILES:-mock}
      # --- Ollama (uncomment to use) ---
      # HEXRAG_PROFILES: ollama
      # OLLAMA_API_BASE: http://ollama:11434
    # depends_on:
    #   - ollama

